name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: "3.11"
  AWS_REGION: us-east-1
  SAM_STACK_NAME: techpulse
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"

jobs:
  # ---------------------------------------------------------------
  # Stage 1 — Quality gate (lint + tests + SAM validate + Docker)
  # All four run in parallel, no serial dependency between them.
  # ---------------------------------------------------------------
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-fail-under=60

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.modified, 'Dockerfile') ||
      contains(github.event.head_commit.modified, 'Dockerfile.lambda') ||
      contains(github.event.head_commit.modified, 'requirements') ||
      contains(github.event.head_commit.modified, 'docker-compose')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Lambda image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.lambda
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sam-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM validate (Free Tier template)
        run: sam validate --template-file infra/template-freetier.yaml --lint

      - name: SAM validate (production template)
        run: sam validate --template-file infra/template.yaml --lint

  # ---------------------------------------------------------------
  # Stage 2a — SAM build + deploy
  # ---------------------------------------------------------------
  sam-deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint-and-test, sam-validate]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS account ID
        id: account
        run: echo "id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      - name: Create ECR repository (idempotent)
        run: |
          aws ecr describe-repositories --repository-names techpulse-lambda --region ${{ env.AWS_REGION }} 2>/dev/null \
            || aws ecr create-repository --repository-name techpulse-lambda --region ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin \
              ${{ steps.account.outputs.id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

      - name: Build and push Lambda container image
        run: |
          IMAGE_URI=${{ steps.account.outputs.id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/techpulse-lambda:${{ github.sha }}
          docker build -f Dockerfile.lambda -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: SAM deploy (dev)
        run: |
          sam deploy \
            --stack-name "${{ env.SAM_STACK_NAME }}-dev" \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND CAPABILITY_NAMED_IAM \
            --region "${{ env.AWS_REGION }}" \
            --resolve-s3 \
            --resolve-image-repos \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --template-file infra/template-freetier.yaml \
            --parameter-overrides \
              "Stage=dev" \
              "ECRImageUri=$IMAGE_URI" \
              "DBMasterUsername=${{ secrets.DB_USERNAME }}" \
              "DBMasterPassword=${{ secrets.DB_PASSWORD }}" \
              "LLMBackend=groq" \
              "GroqApiKey=${{ secrets.GROQ_API_KEY || 'NONE' }}" \
              "GroqModelId=${{ secrets.GROQ_MODEL_ID || 'llama-3.1-8b-instant' }}" \
              "BedrockModelId=${{ secrets.BEDROCK_MODEL_ID || 'amazon.nova-micro-v1:0' }}" \
              "HFApiToken=${{ secrets.HF_API_TOKEN || 'NONE' }}" \
              "HFModelId=${{ secrets.HF_MODEL_ID || 'mistralai/Mistral-7B-Instruct-v0.2' }}" \
              "DBAllowedCidrIp=${{ secrets.DB_ALLOWED_CIDR || '0.0.0.0/0' }}" \
              "DefaultVpcId=${{ secrets.DEFAULT_VPC_ID }}" \
              "DefaultSubnetA=${{ secrets.DEFAULT_SUBNET_A }}" \
              "DefaultSubnetB=${{ secrets.DEFAULT_SUBNET_B }}" \
              "AlertEmail=${{ secrets.ALERT_EMAIL || 'none@example.com' }}"

  # ---------------------------------------------------------------
  # Stage 2b — Build frontend (after SAM deploy)
  # ---------------------------------------------------------------
  build-frontend:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint-and-test, sam-validate, sam-deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get API URL from stack outputs
        id: api
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }}-dev \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "url=$API_URL" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build React frontend
        run: |
          cd frontend
          npm ci
          VITE_API_BASE=${{ steps.api.outputs.url }} npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ---------------------------------------------------------------
  # Stage 3 — Upload frontend to S3 (after both deploy + build)
  # ---------------------------------------------------------------
  upload-frontend:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build-frontend, sam-deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: dev
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist/

      - name: Get stack outputs
        id: stack
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }}-dev \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT

          URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }}-dev \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendUrl'].OutputValue" \
            --output text)
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Upload frontend to S3
        run: |
          aws s3 sync frontend-dist/ s3://${{ steps.stack.outputs.bucket }}/ \
            --delete \
            --region ${{ env.AWS_REGION }}

      - name: Print frontend URL
        run: echo "Frontend live at ${{ steps.stack.outputs.url }}"
