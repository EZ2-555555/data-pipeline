name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: "3.11"
  AWS_REGION: us-east-1
  SAM_STACK_NAME: techpulse
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"

jobs:
  # ---------------------------------------------------------------
  # Stage 1 — Quality gate (lint + tests + SAM validate + Docker)
  # All four run in parallel, no serial dependency between them.
  # ---------------------------------------------------------------
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-fail-under=60

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.modified, 'Dockerfile') ||
      contains(github.event.head_commit.modified, 'requirements') ||
      contains(github.event.head_commit.modified, 'docker-compose')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sam-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM validate (Free Tier template)
        run: sam validate --template-file infra/template-freetier.yaml --lint

      - name: SAM validate (production template)
        run: sam validate --template-file infra/template.yaml --lint

  # ---------------------------------------------------------------
  # Stage 2a — Build frontend (parallel with SAM deploy)
  # ---------------------------------------------------------------
  build-frontend:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint-and-test, sam-validate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build React frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ---------------------------------------------------------------
  # Stage 2b — SAM build + deploy (parallel with frontend build)
  # ---------------------------------------------------------------
  sam-deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint-and-test, sam-validate]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-lambda.txt

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Restore SAM build cache
        uses: actions/cache@v4
        with:
          path: .aws-sam/build
          key: sam-build-${{ hashFiles('requirements-lambda.txt', 'requirements-layer.txt', 'Makefile', 'src/**/*.py') }}
          restore-keys: sam-build-

      - name: SAM build
        run: sam build --cached --parallel --template-file infra/template-freetier.yaml

      - name: SAM deploy (dev)
        run: |
          sam deploy \
            --stack-name "${{ env.SAM_STACK_NAME }}-dev" \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND CAPABILITY_NAMED_IAM \
            --region "${{ env.AWS_REGION }}" \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "Stage=dev" \
              "DBMasterUsername=${{ secrets.DB_USERNAME }}" \
              "DBMasterPassword=${{ secrets.DB_PASSWORD }}" \
              "HFApiToken=${{ secrets.HF_API_TOKEN }}" \
              "HFModelId=${{ secrets.HF_MODEL_ID || 'mistralai/Mistral-7B-Instruct-v0.2' }}" \
              "DBAllowedCidrIp=${{ secrets.DB_ALLOWED_CIDR || '0.0.0.0/0' }}" \
              "DefaultVpcId=${{ secrets.DEFAULT_VPC_ID }}" \
              "DefaultSubnetA=${{ secrets.DEFAULT_SUBNET_A }}" \
              "DefaultSubnetB=${{ secrets.DEFAULT_SUBNET_B }}" \
              "AlertEmail=${{ secrets.ALERT_EMAIL || 'noreply@example.com' }}"

  # ---------------------------------------------------------------
  # Stage 3 — Upload frontend to S3 (after both deploy + build)
  # ---------------------------------------------------------------
  upload-frontend:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build-frontend, sam-deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: dev
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist/

      - name: Get stack outputs
        id: stack
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }}-dev \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT

          URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }}-dev \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendUrl'].OutputValue" \
            --output text)
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Upload frontend to S3
        run: |
          aws s3 sync frontend-dist/ s3://${{ steps.stack.outputs.bucket }}/ \
            --delete \
            --region ${{ env.AWS_REGION }}

      - name: Print frontend URL
        run: echo "Frontend live at ${{ steps.stack.outputs.url }}"
